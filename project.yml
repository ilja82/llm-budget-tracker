name: LiteBudget
options:
  bundleIdPrefix: com.ilja82
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  LiteBudget:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: LiteBudget
        excludes:
          - "*.entitlements"
    resources:
      - LiteBudget/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ilja82.lite-budget
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: LiteBudget/LiteBudget.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableDescription: "LiteLLM Budget Tracker"
        INFOPLIST_KEY_CFBundleDisplayName: LiteBudget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES