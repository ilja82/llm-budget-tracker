name: LLMBudgetTracker
options:
  bundleIdPrefix: com.ilja82
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true

targets:
  LLMBudgetTracker:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: LLMBudgetTracker
        excludes:
          - "*.entitlements"
    resources:
      - LLMBudgetTracker/Assets.xcassets
      - LLMBudgetTracker/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ilja82.llm-budget-tracker
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_ENTITLEMENTS: LLMBudgetTracker/LLMBudgetTracker.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableDescription: "LLM Budget Tracker"
        INFOPLIST_KEY_CFBundleDisplayName: LLM Budget Tracker
        MARKETING_VERSION: "0.0.5"
        CURRENT_PROJECT_VERSION: "5"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.ilja82.llm-budget-tracker.debug
          INFOPLIST_KEY_CFBundleDisplayName: LLM Budget Tracker (Debug)