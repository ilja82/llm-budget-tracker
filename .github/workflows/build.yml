name: Build & Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  SCHEME: LLMBudgetTracker
  CONFIGURATION: Release
  APP_NAME: LLMBudgetTracker

permissions:
  contents: read

jobs:
  release:
    name: Sign, Notarize & Release
    runs-on: macos-26

    environment:
      name: release

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Select Xcode
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install release tooling
        run: |
          set -euo pipefail
          brew install xcodegen create-dmg
          xcodegen --version
          create-dmg --version || true
          gh --version

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="${RUNNER_TEMP}/ci-signing.keychain-db"
          CERT_PATH="${RUNNER_TEMP}/certificate.p12"

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm -f "$CERT_PATH"

      - name: Generate Xcode project
        run: |
          set -euo pipefail
          xcodegen generate

      - name: Archive
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project "${APP_NAME}.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "platform=macOS" \
            -archivePath "${RUNNER_TEMP}/${APP_NAME}.xcarchive"

      - name: Export signed app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          cat > "${RUNNER_TEMP}/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>developer-id</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "${RUNNER_TEMP}/${APP_NAME}.xcarchive" \
            -exportOptionsPlist "${RUNNER_TEMP}/ExportOptions.plist" \
            -exportPath "${RUNNER_TEMP}/export"

          test -d "${RUNNER_TEMP}/export/${APP_NAME}.app"

      - name: Verify signed app
        run: |
          set -euo pipefail

          codesign --verify --deep --strict --verbose=2 \
            "${RUNNER_TEMP}/export/${APP_NAME}.app"

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          xcrun notarytool store-credentials "ci-notarytool-profile" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"

      - name: Create DMG
        run: |
          set -euo pipefail

          mkdir -p "${RUNNER_TEMP}/dmg-root"
          cp -R "${RUNNER_TEMP}/export/${APP_NAME}.app" "${RUNNER_TEMP}/dmg-root/"

          create-dmg \
            --volname "${APP_NAME}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "${APP_NAME}.app" 175 190 \
            --hide-extension "${APP_NAME}.app" \
            --app-drop-link 425 190 \
            "${RUNNER_TEMP}/${APP_NAME}.dmg" \
            "${RUNNER_TEMP}/dmg-root/"

          test -f "${RUNNER_TEMP}/${APP_NAME}.dmg"

      - name: Sign DMG
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="${RUNNER_TEMP}/ci-signing.keychain-db"
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" \
            | head -1 \
            | sed -E 's/.*"(.+)".*/\1/')

          codesign --sign "$SIGNING_IDENTITY" \
            --timestamp \
            "${RUNNER_TEMP}/${APP_NAME}.dmg"

          codesign --verify --verbose=2 "${RUNNER_TEMP}/${APP_NAME}.dmg"

      - name: Notarize DMG
        run: |
          set -euo pipefail

          xcrun notarytool submit "${RUNNER_TEMP}/${APP_NAME}.dmg" \
            --keychain-profile "ci-notarytool-profile" \
            --wait

      - name: Staple and validate DMG
        run: |
          set -euo pipefail

          xcrun stapler staple "${RUNNER_TEMP}/${APP_NAME}.dmg"
          xcrun stapler validate "${RUNNER_TEMP}/${APP_NAME}.dmg"

          spctl -a -t open --context context:primary-signature -vv \
            "${RUNNER_TEMP}/${APP_NAME}.dmg"

      - name: Compute SHA256
        id: sha
        run: |
          set -euo pipefail
          SHA="$(shasum -a 256 "${RUNNER_TEMP}/${APP_NAME}.dmg" | awk '{print $1}')"
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release create "$GITHUB_REF_NAME" \
            "${RUNNER_TEMP}/${APP_NAME}.dmg" \
            --generate-notes \
            --verify-tag

      - name: Show release checksum
        run: |
          set -euo pipefail
          echo "SHA256: ${{ steps.sha.outputs.sha256 }}"

      - name: Cleanup sensitive material
        if: always()
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set +e
          KEYCHAIN_PATH="${RUNNER_TEMP}/ci-signing.keychain-db"

          security lock-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

          rm -f "${RUNNER_TEMP}/certificate.p12"
          rm -f "${RUNNER_TEMP}/ExportOptions.plist"